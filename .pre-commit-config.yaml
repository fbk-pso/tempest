repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: lint
        name: just lint
        entry: just lint
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: typecheck
        name: just typecheck
        entry: just typecheck
        language: system
        pass_filenames: false
