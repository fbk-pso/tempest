name: build-and-release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    uses: ./.github/workflows/test.yml

    with:
      python-version: ${{ matrix.python-version }}

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.51.0"

      - name: Stamp dev version (main only)
        if: github.ref == 'refs/heads/main'
        run: python3 ci/stamp_dev_version.py

      - name: Build sdist + wheel
        run: just build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels
          path: dist

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi-tempest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: artifacts
      - uses: softprops/action-gh-release@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: artifacts/*

  dev-release:
    if: github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: artifacts
      - name: Replace rolling pre-release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true
          short=$(git rev-parse --short=7 HEAD)
          gh release create dev artifacts/* \
            --prerelease \
            --target ${{ github.sha }} \
            --title "Development build (main)" \
            --notes "Built from commit ${short}. Install a wheel directly from this release page."
