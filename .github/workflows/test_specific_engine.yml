name: test-specific-engine

on:
  workflow_call:
    inputs:
      engine-name:
        required: true
        type: string
      engine-class:
        required: true
        type: string

jobs:
  unified-planning-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync environment
        run: uv sync --frozen

      - name: Install OptiMathSAT
        # z3 is a mandatory dependency (installed by uv sync above); OptiMathSAT
        # is compiled by pysmt-install (setuptools pulled in only for the build).
        run: uv run --with setuptools pysmt-install --optimsat --confirm-agreement

      - name: Clone unified-planning test cases (matching the locked commit)
        run: |
          # report.py and up_test_cases/ live in the UP repo, not the installed
          # package, so clone the repo at the same commit uv.lock pins.
          sha=$(python3 -c "import tomllib; d = tomllib.load(open('uv.lock', 'rb')); print(next(p['source']['git'].rsplit('#', 1)[1] for p in d['package'] if p['name'] == 'unified-planning'))")
          git clone --filter=blob:none https://github.com/aiplan4eu/unified-planning.git up-checkout
          git -C up-checkout checkout "$sha"

      - name: Register the tempest engine
        run: |
          echo -e "[engine ${{ inputs.engine-name }}]\nmodule_name: tempest.engine\nclass_name: ${{ inputs.engine-class }}" > .up.ini

      - name: Run the UP report
        env:
          PYTHONPATH: ${{ github.workspace }}/benchmarks
        run: uv run python up-checkout/up_test_cases/report.py ${{ inputs.engine-name }} -m oneshot -t 3 -e test_cases -b logistic farmland classical:depots parking counter_to_50
