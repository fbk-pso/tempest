name: test-specific-engine

on:
  workflow_call:
    inputs:
      engine-name:
        required: true
        type: string
      engine-class:
        required: true
        type: string
      unified-planning-commit:
        required: true
        type: string

jobs:
  unified-planning-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v1
        with:
          python-version: "3.12"

      - name: Install setuptools
        run: python3 -m pip install setuptools

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Install tempest
        run: python3 -m pip install .

      - name: Install msat using pysmt
        run: pysmt-install --msat --confirm-agreement

      - name: Install optimsat using pysmt
        run: pysmt-install --optimsat --confirm-agreement

      - name: Install z3 using pysmt
        run: pysmt-install --z3 --confirm-agreement

      - name: Add the benchmarks folder to the PYTHONPATH
        run: |
          PWD=$(pwd)
          export PYTHONPATH=$PWD/benchmarks:$PYTHONPATH
          echo "PYTHONPATH=$PYTHONPATH" >> $GITHUB_ENV

      - name: Checkout unified-planning
        uses: actions/checkout@v2
        with:
          repository: aiplan4eu/unified-planning
          path: unified-planning
          ref: ${{inputs.unified-planning-commit}}

      - name: Install unified-planning
        run: python3 -m pip install unified-planning/

      - name: Create up.ini to install tempest  in the Unified Planning
        run: |
          echo -e "[engine ${{inputs.engine-name}}]\nmodule_name: tempest.engine\nclass_name: ${{inputs.engine-class}}" > .up.ini

      - name: Run the report
        run: python3 unified-planning/up_test_cases/report.py ${{inputs.engine-name}} -m oneshot -t 3 -e test_cases -b logistic farmland classical:depots parking counter_to_50
