name: CI-on-push

on:
  push

env:
  unified_planning_commit: "0d2bb6a51a782fb688bd4f62877977e911a91f45"

jobs:
  unified-planning-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v1
        with:
          python-version: "3.10"

      - name: Checkout pysmt-optimization
        uses: actions/checkout@v2
        with:
          repository: pysmt/pysmt
          path: pysmt
          ref: optimization

      - name: Install pysmt
        run: python3 -m pip install pysmt/

      - name: Install tempest
        run: python3 -m pip install .

      - name: Install msat using pysmt
        run: pysmt-install --msat --confirm-agreement

      - name: Install optimsat using pysmt
        run: pysmt-install --optimsat --confirm-agreement

      - name: test
        run: |
          PWD=$(pwd)
          ls
          export PYTHONPATH=$PWD/benckmarks:$PYTHONPATH
          echo "PYTHONPATH=$PYTHONPATH"
          echo "PYTHONPATH=$PYTHONPATH" >> $GITHUB_ENV

      - name: Checkout unified-planning
        uses: actions/checkout@v2
        with:
          repository: aiplan4eu/unified-planning
          path: unified-planning
          ref: ${{env.unified_planning_commit}}

      - name: Install unified-planning
        run: python3 -m pip install unified-planning/

      - name: Create up.ini to install tempest  in the Unified Planning
        run: |
          echo -e "[engine tempest]\nmodule_name: tempest.engine\nclass_name: TempestEngine\n[engine tempest-ni]\nmodule_name: tempest.engine\nclass_name: TempestNonIncremental\n[engine tempest-opt]\nmodule_name: tempest.engine\nclass_name: TempestOptimalEngine" > .up.ini

      - name: Run the report
        run: python3 unified-planning/up_test_cases/report.py tempest tempest-ni tempest-opt -m oneshot -t 3 -e test_cases -b logistics
